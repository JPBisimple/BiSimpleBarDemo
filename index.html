<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#5E0E26">
<title>Backbar</title>
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Backbar">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap">
<style>
:root{
  --primary:#8A1538;
  --primary-dark:#5E0E26;
  --secondary:#043C57;
  --accent:#B7873B;
  --accent-dark:#573B08;
  --background:#F7F1E7;
  --paper:#FFFDF8;
  --ink:#1A1A1A;
  --ink-soft:#4A4140;
  --ink-mute:#8A7E7B;
  --line:rgba(26,26,26,.10);
  --line-strong:rgba(26,26,26,.22);
  --danger:#B0273C;
  --warn:#A87413;
  --ok:#2C6E3A;
  --display-font:'Playfair Display',serif;
  --body-font:'Inter',system-ui,sans-serif;
  --radius:14px;
  --shadow-1:0 1px 2px rgba(26,26,26,.06),0 2px 8px rgba(26,26,26,.04);
  --shadow-2:0 4px 16px rgba(26,26,26,.10),0 1px 3px rgba(26,26,26,.06);
  --header-h:56px;
  --nav-h:64px;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--background);color:var(--ink);font-family:var(--body-font);font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased}
body{padding-top:var(--header-h);padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom));min-height:100vh}
button,input,select,textarea{font:inherit;color:inherit}
button{cursor:pointer;border:none;background:none}
a{color:var(--primary);text-decoration:none}

/* ===== HEADER ===== */
.topbar{
  position:fixed;top:0;left:0;right:0;height:var(--header-h);
  background:var(--primary-dark);color:#fff;
  display:flex;align-items:center;gap:10px;padding:0 14px;
  z-index:50;
  box-shadow:0 1px 0 rgba(0,0,0,.15),0 2px 8px rgba(0,0,0,.12);
}
.brand{font-family:var(--display-font);font-weight:700;font-size:22px;letter-spacing:.02em}
.brand .dot{color:var(--accent);font-style:italic}
.tenant-switch{
  margin-left:auto;display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  padding:6px 10px;border-radius:999px;font-size:13px;color:#fff;
  min-height:36px;
}
.tenant-switch select{background:transparent;color:#fff;border:none;font-weight:600;padding-right:4px}
.tenant-switch select option{color:#000}
.icon-btn{
  width:40px;height:40px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.06);color:#fff;
}
.icon-btn:hover{background:rgba(255,255,255,.14)}

/* ===== NAV ===== */
.bottomnav{
  position:fixed;left:0;right:0;bottom:0;height:calc(var(--nav-h) + env(safe-area-inset-bottom));
  background:var(--paper);border-top:1px solid var(--line);
  display:grid;grid-template-columns:repeat(6,1fr);
  padding-bottom:env(safe-area-inset-bottom);
  z-index:50;
}
.nav-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  font-size:10px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-mute);font-weight:600;
  min-height:44px;padding:6px 2px;
}
.nav-btn .ic{font-size:18px;line-height:1}
.nav-btn.active{color:var(--primary)}
.nav-btn.active .ic{color:var(--primary)}

/* ===== LAYOUT ===== */
.view{padding:18px 16px 24px}
.section-hd{display:flex;align-items:baseline;gap:10px;margin-bottom:14px}
.section-hd h1{font-family:var(--display-font);font-weight:700;font-size:30px;margin:0;letter-spacing:-.01em;color:var(--ink)}
.section-hd .sub{font-size:13px;color:var(--ink-mute);font-style:italic;font-family:var(--display-font)}
.section-hd .rule{flex:1;height:1px;background:var(--line-strong);margin:0 8px}

.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-1);overflow:hidden}
.card + .card{margin-top:12px}
.card-hd{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.card-hd h2{margin:0;font-family:var(--display-font);font-weight:700;font-size:20px}
.card-bd{padding:14px 16px}
.row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.row .grow{flex:1;min-width:0}
.row .grow .ttl{font-weight:600}
.row .grow .sb{font-size:12px;color:var(--ink-mute);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .right{font-variant-numeric:tabular-nums;text-align:right;color:var(--ink-soft)}
.row.click{cursor:pointer}
.row.click:hover{background:rgba(138,21,56,.04)}

/* ===== STAT TILES ===== */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat{
  background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:14px;
  position:relative;overflow:hidden;
}
.stat .lab{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-mute);font-weight:600}
.stat .num{font-family:var(--display-font);font-size:34px;font-weight:700;line-height:1.05;margin-top:4px;color:var(--primary)}
.stat .num.s{color:var(--secondary)}
.stat .num.a{color:var(--accent-dark)}

/* ===== CHIPS / BADGES ===== */
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;background:rgba(138,21,56,.08);color:var(--primary-dark)}
.chip.s{background:rgba(4,60,87,.08);color:var(--secondary)}
.chip.a{background:rgba(183,135,59,.12);color:var(--accent-dark)}
.chip.warn{background:rgba(168,116,19,.12);color:var(--warn)}
.chip.bad{background:rgba(176,39,60,.12);color:var(--danger)}
.chip.ok{background:rgba(44,110,58,.12);color:var(--ok)}

/* ===== FORM ===== */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.field label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-mute);font-weight:600}
.input,select.input,textarea.input{
  width:100%;background:var(--paper);border:1px solid var(--line-strong);border-radius:10px;
  padding:11px 12px;min-height:44px;font-size:15px;color:var(--ink);
  transition:border-color .15s, box-shadow .15s;
}
.input:focus,select.input:focus,textarea.input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(138,21,56,.15)}
textarea.input{min-height:88px;resize:vertical}
.search{
  width:100%;background:var(--paper);border:1px solid var(--line-strong);border-radius:999px;padding:10px 14px;
  min-height:42px;font-size:14px;margin-bottom:12px;
}

/* ===== BUTTONS ===== */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:11px 16px;min-height:44px;border-radius:10px;
  font-weight:600;font-size:14px;letter-spacing:.02em;
  background:var(--primary);color:#fff;border:1px solid var(--primary-dark);
  transition:transform .08s, background .15s, box-shadow .15s;
}
.btn:hover{background:var(--primary-dark)}
.btn:active{transform:translateY(1px)}
.btn.ghost{background:transparent;color:var(--primary);border-color:var(--line-strong)}
.btn.ghost:hover{background:rgba(138,21,56,.05)}
.btn.sec{background:var(--secondary);border-color:#022a3d}
.btn.sec:hover{background:#022a3d}
.btn.acc{background:var(--accent);border-color:var(--accent-dark);color:#fff}
.btn.acc:hover{background:var(--accent-dark)}
.btn.danger{background:var(--danger);border-color:#7a1928;color:#fff}
.btn.ghost.danger{background:var(--danger);border-color:#7a1928;color:#fff}
.btn.ghost.danger:hover{background:#7a1928;color:#fff}
.btn.sm{padding:6px 10px;min-height:32px;font-size:12px;border-radius:8px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}

/* ===== TOAST ===== */
.toasts{position:fixed;top:calc(var(--header-h) + 8px);left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;width:min(92%,420px)}
.toast{
  background:var(--ink);color:#fff;padding:12px 16px;border-radius:10px;font-size:14px;
  box-shadow:var(--shadow-2);display:flex;gap:10px;align-items:center;
  animation:tin .25s ease-out;
}
.toast.ok{background:var(--ok)}
.toast.bad{background:var(--danger)}
@keyframes tin{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}

/* ===== MODAL ===== */
.modal-bg{position:fixed;inset:0;background:rgba(26,26,26,.55);z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:fin .2s ease-out}
@keyframes fin{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--paper);width:100%;max-width:560px;max-height:92vh;border-radius:18px 18px 0 0;
  display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--shadow-2);
  animation:min .25s ease-out;
}
@keyframes min{from{transform:translateY(20px)}to{transform:none}}
@media(min-width:720px){
  .modal-bg{align-items:center}
  .modal{border-radius:18px}
}
.modal-hd{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;background:var(--paper);position:sticky;top:0}
.modal-hd h3{margin:0;font-family:var(--display-font);font-size:20px;font-weight:700;flex:1}
.modal-bd{padding:16px 18px;overflow:auto;flex:1}
.modal-ft{padding:12px 18px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end;background:var(--paper)}

/* ===== SETUP / LOGIN ===== */
.center-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,var(--background) 0%,#EEE3D2 100%)}
.center-card{width:100%;max-width:420px;background:var(--paper);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow-2);padding:28px 24px}
.center-card h1{font-family:var(--display-font);font-size:36px;font-weight:700;margin:0 0 4px;color:var(--primary)}
.center-card h1 .dot{color:var(--accent);font-style:italic}
.center-card .tag{font-size:13px;color:var(--ink-mute);font-style:italic;font-family:var(--display-font);margin-bottom:24px}
.center-card .err{background:rgba(176,39,60,.08);color:var(--danger);padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:12px}
.center-card .help{font-size:12px;color:var(--ink-mute);line-height:1.5;margin-top:16px;padding-top:16px;border-top:1px solid var(--line)}
.center-card code{background:rgba(26,26,26,.06);padding:1px 5px;border-radius:4px;font-size:12px}

/* ===== COCKTAIL / PREP DETALJER ===== */
.cocktail-hero{
  background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%);
  color:#fff;padding:22px 18px;border-radius:var(--radius);margin-bottom:14px;
  position:relative;overflow:hidden;
}
.cocktail-hero::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 80% 20%,rgba(183,135,59,.30),transparent 50%);pointer-events:none}
.cocktail-hero h2{font-family:var(--display-font);font-size:32px;font-weight:700;margin:0 0 4px;letter-spacing:-.01em}
.cocktail-hero .menu{font-style:italic;font-family:var(--display-font);font-size:15px;opacity:.92;line-height:1.4}
.cocktail-hero .meta{margin-top:14px;display:flex;gap:14px;font-size:12px;opacity:.88}
.cocktail-hero .meta b{color:var(--accent);display:block;font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:2px}

.kv{display:grid;grid-template-columns:110px 1fr;gap:8px 12px;font-size:14px}
.kv dt{color:var(--ink-mute);font-size:11px;text-transform:uppercase;letter-spacing:.06em;font-weight:600;padding-top:3px}
.kv dd{margin:0;color:var(--ink)}

.cost-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cost-tile{background:rgba(138,21,56,.04);border:1px solid var(--line);border-radius:10px;padding:12px}
.cost-tile .lab{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-mute);font-weight:600}
.cost-tile .val{font-family:var(--display-font);font-size:22px;font-weight:700;margin-top:2px}
.cost-tile.warn{background:rgba(168,116,19,.08);border-color:rgba(168,116,19,.30)}
.cost-tile.bad{background:rgba(176,39,60,.08);border-color:rgba(176,39,60,.30)}
.cost-tile.ok{background:rgba(44,110,58,.06);border-color:rgba(44,110,58,.25)}

/* Tabel-vise inventory */
.inv-row{display:grid;grid-template-columns:1fr auto;gap:6px;padding:12px 16px;border-bottom:1px solid var(--line);align-items:center}
.inv-row .name{font-weight:600}
.inv-row .meta{font-size:11px;color:var(--ink-mute);text-transform:uppercase;letter-spacing:.05em}
.inv-row .stock{font-variant-numeric:tabular-nums;text-align:right;font-weight:600}
.inv-row .stock.low{color:var(--danger)}
.inv-row .stock.ok{color:var(--ok)}

/* ===== EMPTY ===== */
.empty{text-align:center;padding:48px 20px;color:var(--ink-mute)}
.empty .big{font-family:var(--display-font);font-size:22px;color:var(--ink);margin-bottom:6px}

/* ===== LOADING ===== */
.spinner{
  width:32px;height:32px;border:3px solid var(--line);border-top-color:var(--primary);
  border-radius:50%;animation:spin .8s linear infinite;margin:30px auto;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== GUEST SHIFT ===== */
.gs-cocktail{
  background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px;margin-bottom:12px;page-break-inside:avoid;
}
.gs-cocktail h3{font-family:var(--display-font);font-size:22px;font-weight:700;margin:0 0 4px;color:var(--primary)}
.gs-cocktail .gs-menu{font-style:italic;font-family:var(--display-font);font-size:14px;color:var(--ink-soft);margin-bottom:10px}
.gs-cocktail .gs-flavour{font-size:13px;color:var(--ink-soft);margin-bottom:10px;line-height:1.5}
.gs-cocktail .gs-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px 14px;font-size:12px}
.gs-cocktail .gs-grid b{color:var(--ink-mute);text-transform:uppercase;letter-spacing:.06em;font-size:10px;font-weight:600;display:block}
.gs-cocktail .gs-allerg{margin-top:10px;font-size:11px;color:var(--ink-mute);font-style:italic;border-top:1px solid var(--line);padding-top:8px}

/* ===== PRINT ===== */
@media print{
  .topbar,.bottomnav,.no-print{display:none !important}
  body{background:#fff;padding:0;color:#000}
  .card,.gs-cocktail{box-shadow:none;border:1px solid #ccc;break-inside:avoid}
  .view{padding:0}
  @page{margin:14mm}
}
</style>
</head>
<body>

<!-- Toast container -->
<div class="toasts" id="toasts"></div>

<!-- Root -->
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ============================================================================
// BACKBAR — single-file app
// ============================================================================

const SUPABASE_CONFIG = {
  url: 'https://gnhmnsstchpmjibujthb.supabase.co',
  anonKey: 'sb_publishable_vhcOhNuZod5hbv6p3pFn_A_sM5rydim'
};

// ---- state ----
const state = {
  sb: null,
  user: null,
  tenants: [],          // tenants user is member of, with role
  activeTenantId: null,
  route: '#index',
  data: {               // cached for active tenant
    ingredients: [],
    preps: [],
    prep_components: [],
    cocktails: [],
    cocktail_components: [],
  },
  loading: false,
  rtChannel: null,
};

const $ = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));
const el = (tag, attrs={}, ...children) => {
  const e = document.createElement(tag);
  for (const k in attrs) {
    if (k === 'class') e.className = attrs[k];
    else if (k === 'html') e.innerHTML = attrs[k];
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else if (k === 'style' && typeof attrs[k] === 'object') Object.assign(e.style, attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
};

// Currency + locale læses fra aktiv tenant (med fornuftige fallbacks)
function currentTenant() {
  return state.tenants.find(t => t.id === state.activeTenantId);
}
function currentCurrency() { return currentTenant()?.currency || 'DKK'; }
function currentLocale()   { return currentTenant()?.locale   || 'da-DK'; }

const money = n => (n == null || isNaN(n)) ? '—' : new Intl.NumberFormat(currentLocale(),{style:'currency',currency:currentCurrency(),maximumFractionDigits:2}).format(n);
// Bagudkompatibilitet: dkk() er alias for money() — alle eksisterende kald virker stadig
const dkk = money;
const num = (n, d=2) => (n == null || isNaN(n)) ? '—' : Number(n).toLocaleString(currentLocale(),{minimumFractionDigits:0,maximumFractionDigits:d});
// Unit-price uden valuta (priser pr. ml/gr/stk vises som rent tal — valuta findes på sell prices)
const unitPrice = (n, d=2) => (n == null || isNaN(n)) ? '—' : Number(n).toLocaleString(currentLocale(),{minimumFractionDigits:0,maximumFractionDigits:d});

function toast(msg, kind='') {
  const t = el('div', {class:'toast ' + kind}, msg);
  $('#toasts').appendChild(t);
  setTimeout(() => { t.style.opacity = 0; setTimeout(() => t.remove(), 300); }, 2600);
}

function applyTheme(theme) {
  if (!theme) return;
  const r = document.documentElement;
  if (theme.primary)        r.style.setProperty('--primary', theme.primary);
  if (theme.primary_dark)   r.style.setProperty('--primary-dark', theme.primary_dark);
  if (theme.secondary)      r.style.setProperty('--secondary', theme.secondary);
  if (theme.accent)         r.style.setProperty('--accent', theme.accent);
  if (theme.background)     r.style.setProperty('--background', theme.background);
  if (theme.display_font)   r.style.setProperty('--display-font', `'${theme.display_font}', serif`);
  if (theme.body_font)      r.style.setProperty('--body-font', `'${theme.body_font}', system-ui, sans-serif`);
  document.body.style.background = 'var(--background)';
  // Theme-color meta
  const m = document.querySelector('meta[name="theme-color"]');
  if (m && theme.primary_dark) m.content = theme.primary_dark;
}

// ============================================================================
// BOOT
// ============================================================================
async function boot() {
  if (!SUPABASE_CONFIG.url || SUPABASE_CONFIG.url.includes('YOUR-PROJECT')) {
    return renderSetup();
  }
  state.sb = supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);
  state.sb.auth.onAuthStateChange((_evt, session) => {
    state.user = session?.user || null;
    if (!state.user) {
      cleanupRealtime();
      renderLogin();
    }
  });
  const { data: { session } } = await state.sb.auth.getSession();
  state.user = session?.user || null;
  if (!state.user) return renderLogin();
  await afterLogin();
}

async function afterLogin() {
  await loadTenants();
  if (state.tenants.length === 0) {
    return renderNoTenant();
  }
  // Restore active tenant or pick first
  const stored = localStorage.getItem('activeTenantId');
  if (stored && state.tenants.some(t => t.id === stored)) {
    state.activeTenantId = stored;
  } else {
    state.activeTenantId = state.tenants[0].id;
    localStorage.setItem('activeTenantId', state.activeTenantId);
  }
  await switchTenant(state.activeTenantId);
}

async function loadTenants() {
  // Get memberships + tenant (incl. currency + locale)
  const { data, error } = await state.sb
    .from('memberships')
    .select('role, tenant_id, tenants(id, slug, name, city, theme, subscription_tier, currency, locale)')
    .eq('user_id', state.user.id);
  if (error) { toast('Could not load tenants: ' + error.message, 'bad'); return; }
  state.tenants = (data || [])
    .filter(m => m.tenants)
    .map(m => ({ ...m.tenants, role: m.role }));
}

async function switchTenant(tid) {
  state.activeTenantId = tid;
  localStorage.setItem('activeTenantId', tid);
  const t = state.tenants.find(x => x.id === tid);
  applyTheme(t?.theme);
  await loadAll();
  setupRealtime();
  renderApp();
}

function cleanupRealtime() {
  if (state.rtChannel) {
    state.sb.removeChannel(state.rtChannel);
    state.rtChannel = null;
  }
}

function setupRealtime() {
  cleanupRealtime();
  if (!state.activeTenantId) return;
  state.rtChannel = state.sb
    .channel('ingredients-' + state.activeTenantId)
    .on('postgres_changes',
      { event: 'UPDATE', schema: 'public', table: 'ingredients', filter: `tenant_id=eq.${state.activeTenantId}` },
      payload => {
        const idx = state.data.ingredients.findIndex(i => i.id === payload.new.id);
        if (idx >= 0) state.data.ingredients[idx] = payload.new;
        if (location.hash === '#inventory' || location.hash === '#index' || location.hash === '#orders') {
          renderRoute();
        }
      }
    )
    .subscribe();
}

async function loadAll() {
  state.loading = true;

  const [ing, preps, pc, cocks, cc] = await Promise.all([
    state.sb.from('ingredients').select('*').eq('tenant_id', tid).order('category').order('name'),
    state.sb.from('preps').select('*').eq('tenant_id', tid).order('type').order('name'),
    state.sb.from('prep_components').select('*').eq('tenant_id', tid),
    state.sb.from('cocktails').select('*').eq('tenant_id', tid).order('name'),

  ]);

// ============================================================================
// COST CALCULATION
// ============================================================================
function ingredientPricePerUnit(ing) {
  if (!ing || !ing.purchase_price || !ing.purchase_size) return null;
  return ing.purchase_price / ing.purchase_size;
}

/**
 * Calculates price per unit (of yield_unit) for a prep.
 * Recursive via child_preps. Returns null if any component is missing a price.
 *
 * KNOWN LIMITATION: we do not convert between units (gr vs ml).
 * Sum of component costs is divided by yield_quantity regardless of units.
 */
function prepPricePerUnit(prepId, visited = new Set()) {
  if (visited.has(prepId)) return null; // cycle guard
  visited.add(prepId);
  const prep = state.data.preps.find(p => p.id === prepId);
  if (!prep) return null;
  const comps = state.data.prep_components.filter(c => c.prep_id === prepId);
  if (comps.length === 0) return null;
  let total = 0;
  for (const c of comps) {
    let costPer = null;
    if (c.ingredient_id) {
      const ing = state.data.ingredients.find(i => i.id === c.ingredient_id);
      costPer = ingredientPricePerUnit(ing);
    } else if (c.child_prep_id) {
      costPer = prepPricePerUnit(c.child_prep_id, new Set(visited));
    }
    if (costPer == null) return null;
    total += costPer * c.quantity;
  }
  if (!prep.yield_quantity) return null;
  return total / prep.yield_quantity;
}

function cocktailCost(cocktailId) {
  const comps = state.data.cocktail_components.filter(c => c.cocktail_id === cocktailId);
  if (comps.length === 0) return { cost: 0, missing: [] };
  let total = 0;
  const missing = [];
  for (const c of comps) {
    let costPer = null;
    let name = '?';
    if (c.ingredient_id) {
      const ing = state.data.ingredients.find(i => i.id === c.ingredient_id);
      name = ing?.name || 'ingredient';
      costPer = ingredientPricePerUnit(ing);
    } else if (c.prep_id) {
      const p = state.data.preps.find(x => x.id === c.prep_id);
      name = p?.name || 'prep';
      costPer = prepPricePerUnit(c.prep_id);
    }
    if (costPer == null) { missing.push(name); continue; }
    total += costPer * c.quantity;
  }
  return { cost: total, missing };
}

function renderNav() {

    { hash: '#index',     ic: '◐', label: 'Index' },
    { hash: '#cocktails', ic: '☐', label: 'Cocktails' },
    { hash: '#prep',      ic: '⌬', label: 'Prep' },

  const nav = el('nav', { class: 'bottomnav' });
  items.forEach(it => {

window.addEventListener('hashchange', () => {
  // refresh nav active state + view
  const oldNav = $('.bottomnav');
  if (oldNav) oldNav.replaceWith(renderNav());
  renderRoute();
});

function renderRoute() {
  const main = $('#main');
  if (!main) return;
  main.innerHTML = '';
  const h = location.hash || '#index';
  const v = el('div', { class: 'view' });
  main.appendChild(v);
  if (state.loading) {
    v.appendChild(el('div', { class: 'spinner' }));
    return;
  }
  if (h.startsWith('#cocktail/')) return renderCocktailDetail(v, h.split('/')[1]);
  if (h.startsWith('#prep/'))     return renderPrepDetail(v, h.split('/')[1]);
  switch (h) {
    case '#cocktails': return renderCocktails(v);
    case '#prep':      return renderPreps(v);
    case '#inventory': return renderInventory(v);
    case '#orders':    return renderOrders(v);
    case '#guest':     return renderGuestShift(v);
    case '#index':
    default:           return renderIndex(v);
  }
}

function renderCocktails(v) {
  const isAdmin = currentRole() === 'admin';
  v.appendChild(el('div', { class: 'section-hd' },
    el('h1', {}, 'Cocktails'),
    el('div', { class: 'rule' }),
    el('div', { class: 'sub' }, `${state.data.cocktails.length} items`),
  ));

  const q = el('input', { class: 'search', placeholder: 'Search cocktail or ingredient…', oninput: () => render() });
  const onlyActive = el('label', { class: 'chip s', style:{cursor:'pointer'} },
    el('input', { type:'checkbox', id:'onlyactive', style:{marginRight:'4px'}, onchange: () => render() }),
    'Active only',
  );
  v.appendChild(q);
  v.appendChild(el('div', { style: { marginBottom: '10px' } }, onlyActive));

  const list = el('div', { class: 'card' });
  v.appendChild(list);

  if (isAdmin) {
    v.appendChild(el('div', { class: 'btn-row', style: { marginTop: '12px' } },
      el('button', { class: 'btn', onclick: () => openCocktailEditor(null) }, '+ New cocktail'),
    ));
  }

  function render() {
    const term = q.value.toLowerCase().trim();
    const filterActive = $('#onlyactive')?.checked;
    list.innerHTML = '';
    let rows = state.data.cocktails;
    if (filterActive) rows = rows.filter(c => c.is_active);
    if (term) {
      rows = rows.filter(c =>
        (c.name||'').toLowerCase().includes(term) ||
        (c.menu_wording||'').toLowerCase().includes(term)
      );
    }
    if (rows.length === 0) {
      list.appendChild(el('div', { class: 'empty' },
        el('div', { class: 'big' }, 'No cocktails'),
        el('div', {}, 'Adjust search or create a new one.')
      ));
      return;
    }
    rows.forEach(c => {
      const { cost, missing } = cocktailCost(c.id);
      const margin = c.sell_price && cost ? ((c.sell_price - cost) / c.sell_price) * 100 : null;
      const row = el('div', { class: 'row click', onclick: () => location.hash = '#cocktail/' + c.id },
        el('div', { class: 'grow' },
          el('div', { class: 'ttl' }, c.name, !c.is_active ? el('span', { class:'chip warn', style:{marginLeft:'6px'} }, 'INACTIVE') : null),
          el('div', { class: 'sb' }, c.menu_wording || ''),
        ),
        el('div', { class: 'right' },
          el('div', { style:{fontWeight:600} }, dkk(c.sell_price)),
          missing.length > 0
            ? el('div', { class:'chip warn', style:{marginTop:'4px'} }, '⚠ price')
            : margin != null
              ? el('div', { class: 'chip ' + (margin < 70 ? 'warn' : 'ok'), style:{marginTop:'4px'} }, num(margin,1) + '%')
              : null,
        ),
      );
      list.appendChild(row);
    });
  }
  render();
}

function renderCocktailDetail(v, id) {

    cb.appendChild(el('div',{style:{marginTop:'10px'},class:'chip warn'}, '⚠ Missing price for: ' + missing.join(', ')));
  } else if (margin != null && margin < 70) {
    cb.appendChild(el('div',{style:{marginTop:'10px'},class:'chip warn'}, '⚠ Margin below 70%'));
  }
  costCard.appendChild(cb);

  // Components

    } else if (comp.prep_id) {
      const p = state.data.preps.find(x => x.id === comp.prep_id);
      label = p?.name || 'prep';
      sub = p?.type || 'PREP';

  meta.appendChild(el('div',{class:'card-hd'}, el('h2',{},'Details')));

    ));

  const cats = ['All', ...Array.from(new Set(state.data.ingredients.map(i => i.category).filter(Boolean))).sort()];
  const sup = ['All', ...Array.from(new Set(state.data.ingredients.map(i => i.supplier).filter(Boolean))).sort()];
  const catSel = el('select',{class:'input',onchange:render});
  cats.forEach(c => catSel.appendChild(el('option',{value:c}, c)));
  const supSel = el('select',{class:'input',onchange:render});
  sup.forEach(s => supSel.appendChild(el('option',{value:s}, s)));
  v.appendChild(el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',marginBottom:'12px'}},
    el('div',{class:'field',style:{margin:0}}, el('label',{},'Category'), catSel),
    el('div',{class:'field',style:{margin:0}}, el('label',{},'Supplier'), supSel),
  ));

  if (isAdmin) {
    v.appendChild(el('div',{class:'btn-row',style:{marginBottom:'12px'}},
      el('button',{class:'btn', onclick:() => openIngredientEditor(null)}, '+ New ingredient'),
      el('button',{class:'btn sec', onclick:openBarcodeScanner}, '⟟ Barcode'),
    ));
  }

  const list = el('div',{class:'card'});
  v.appendChild(list);

  function render() {
    const term = search.value.toLowerCase().trim();
    const fcat = catSel.value;
    const fsup = supSel.value;
    list.innerHTML = '';
    let rows = state.data.ingredients;
    if (fcat !== 'All') rows = rows.filter(i => i.category === fcat);
    if (fsup !== 'All') rows = rows.filter(i => i.supplier === fsup);
    if (term) rows = rows.filter(i => (i.name||'').toLowerCase().includes(term));
    if (rows.length === 0) {
      list.appendChild(el('div',{class:'empty'}, el('div',{class:'big'},'No ingredients'), el('div',{},'Adjust search or filters.')));
      return;
    }
    rows.forEach(i => {
      const ppu = ingredientPricePerUnit(i);
      const lowFlag = (i.current_stock || 0) < (i.min_stock || 0);
      const row = el('div',{class:'inv-row', style:{cursor:isAdmin ? 'pointer':'default'}});
      const main = el('div',{},
        el('div',{class:'name'}, i.name),
        el('div',{class:'meta'},
          (i.category || '—') + ' · ' + (i.supplier || '—') + ' · ' +
          (ppu != null ? unitPrice(ppu) + ' / ' + (i.purchase_unit||'') : 'no price'))
      );
      if (isAdmin) main.addEventListener('click', () => openIngredientEditor(i));
      row.appendChild(main);

      // Stock cell
      const stockBtn = el('button',{class:'btn ghost sm', onclick:() => openStockEditor(i)},
        `${num(i.current_stock || 0, 0)} ${i.purchase_unit || ''}`);
      if (lowFlag) stockBtn.classList.add('danger');
      row.appendChild(stockBtn);
      list.appendChild(row);
    });
  }
  render();
}

async function openStockEditor(ing) {

// --- Barcode scanner ---
async function openBarcodeScanner() {
  if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
    return toast('Barcode scanning requires HTTPS','bad');
  }
  if (!('BarcodeDetector' in window)) {
    return toast('BarcodeDetector not supported. ZXing fallback not included in this build.','bad');
  }
  const video = el('video',{autoplay:true, muted:true, playsinline:true, style:{width:'100%',borderRadius:'10px',background:'#000'}});
  const status = el('div',{style:{fontSize:'13px',color:'var(--ink-mute)',textAlign:'center',marginTop:'8px'}}, 'Hold the barcode up to the camera…');
  let stream = null, raf = null;
  const cleanup = () => {
    if (raf) cancelAnimationFrame(raf);
    if (stream) stream.getTracks().forEach(t => t.stop());
  };
  await modal('Scan barcode', el('div',{},video,status), null, cleanup);
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'environment' } });
    video.srcObject = stream;
    const det = new BarcodeDetector({ formats:['ean_13','ean_8','code_128','upc_a','upc_e','qr_code'] });
    const scan = async () => {
      try {
        const codes = await det.detect(video);
        if (codes.length > 0) {
          const code = codes[0].rawValue;
          cleanup();
          closeModal();
          const hit = state.data.ingredients.find(i => i.barcode === code);
          if (hit) {
            toast('Found: ' + hit.name, 'ok');
            openStockEditor(hit);
          } else {
            if (confirm('Barcode not found (' + code + '). Create new ingredient?')) {
              openIngredientEditor({ barcode: code });
            }
          }
          return;
        }
      } catch(e) { /* ignore */ }
      raf = requestAnimationFrame(scan);
    };
    scan();
  } catch(e) {
    toast('Camera error: ' + e.message, 'bad');
    closeModal();
  }
}

function renderForecast(body) {
  // Choose cocktails + quantity
  const counts = JSON.parse(localStorage.getItem('forecast_counts_' + state.activeTenantId) || '{}');

  const list = el('div',{class:'card'});
  list.appendChild(el('div',{class:'card-hd'}, el('h2',{},'Expected sales per cocktail')));
  state.data.cocktails.filter(c => c.is_active).forEach(c => {
    const inp = el('input',{type:'number',min:'0',value:String(counts[c.id]||0), class:'input', style:{maxWidth:'90px',padding:'6px 8px',minHeight:'36px'}, oninput:e=>{
      counts[c.id] = Number(e.target.value) || 0;
      localStorage.setItem('forecast_counts_'+state.activeTenantId, JSON.stringify(counts));
      compute();
    }});
    list.appendChild(el('div',{class:'row'},
      el('div',{class:'grow'}, el('div',{class:'ttl'}, c.name), el('div',{class:'sb'}, c.menu_wording||'')),
      el('div',{class:'right'}, inp),
    ));
  });
  body.appendChild(list);

  const result = el('div',{style:{marginTop:'14px'}});
  body.appendChild(result);

  function ingredientUsage() {
    // returns Map<ingredient_id, qty> — uses ingredient's purchase_unit aggregate (no unit conversion!)
    const usage = new Map();
    function addIng(ingId, qty) {
      usage.set(ingId, (usage.get(ingId) || 0) + qty);
    }
    function expandPrep(prepId, qtyOfPrep) {
      const prep = state.data.preps.find(p => p.id === prepId);
      if (!prep || !prep.yield_quantity) return;
      const ratio = qtyOfPrep / prep.yield_quantity;
      const comps = state.data.prep_components.filter(c => c.prep_id === prepId);
      comps.forEach(c => {
        if (c.ingredient_id) addIng(c.ingredient_id, c.quantity * ratio);
        else if (c.child_prep_id) expandPrep(c.child_prep_id, c.quantity * ratio);
      });
    }
    for (const [cid, n] of Object.entries(counts)) {
      if (!n) continue;
      const comps = state.data.cocktail_components.filter(cc => cc.cocktail_id === cid);
      comps.forEach(c => {
        if (c.ingredient_id) addIng(c.ingredient_id, c.quantity * n);
        else if (c.prep_id) expandPrep(c.prep_id, c.quantity * n);
      });
    }
    return usage;
  }

  function compute() {
    result.innerHTML = '';
    const usage = ingredientUsage();
    if (usage.size === 0) {
      result.appendChild(el('div',{class:'empty'}, el('div',{class:'big'},'Set cocktail counts')));
      return;
    }
    // Calculate order: need usage - current_stock, rounded up to purchase_size units
    const bySupplier = new Map();
    for (const [ingId, used] of usage.entries()) {
      const ing = state.data.ingredients.find(i => i.id === ingId);
      if (!ing) continue;
      const have = ing.current_stock || 0;
      const target = Math.max(used, ing.min_stock || 0);
      const need = target - have;
      if (need <= 0) continue;
      const units = ing.purchase_size ? Math.ceil(need / ing.purchase_size) : 1;
      const supplier = ing.supplier || 'No supplier';
      if (!bySupplier.has(supplier)) bySupplier.set(supplier, []);
      bySupplier.get(supplier).push({ ing, used, need, units });
    }
    if (bySupplier.size === 0) {
      result.appendChild(el('div',{class:'empty'}, el('div',{class:'big'},'Stock covers forecast')));
      return;
    }
    for (const [sup, items] of bySupplier.entries()) {
      const card = el('div',{class:'card'});
      const total = items.reduce((s,it) => s + (it.ing.purchase_price || 0) * it.units, 0);
      card.appendChild(el('div',{class:'card-hd'},
        el('h2',{}, sup),
        el('span',{class:'chip a'}, dkk(total)),
      ));
      items.forEach(it => {
        card.appendChild(el('div',{class:'row'},
          el('div',{class:'grow'},
            el('div',{class:'ttl'}, it.ing.name),
            el('div',{class:'sb'}, `Need: ${num(it.need,1)} ${it.ing.purchase_unit||''}`),
          ),
          el('div',{class:'right'},
            el('div',{style:{fontWeight:600}}, `${it.units} × ${num(it.ing.purchase_size,0)} ${it.ing.purchase_unit||''}`),
            el('div',{class:'sb',style:{fontSize:'12px'}}, dkk((it.ing.purchase_price||0)*it.units)),
          ),
        ));
      });
      card.appendChild(el('div',{class:'card-bd no-print',style:{display:'flex',gap:'8px'}},
        el('button',{class:'btn ghost sm', onclick:()=>exportSupplierCSV(sup,items)},'⇩ CSV'),
        el('button',{class:'btn ghost sm', onclick:()=>exportSupplierMail(sup,items)},'✉ Email'),
      ));
      result.appendChild(card);
    }
  }
  compute();
}

function renderStockOrders(body) {
  const low = state.data.ingredients.filter(i => (i.current_stock||0) < (i.min_stock||0));
  if (low.length === 0) {
    body.appendChild(el('div',{class:'empty'}, el('div',{class:'big'},'Everything in stock'), el('div',{},'No ingredients below minimum.')));
    return;
  }
  const bySupplier = new Map();
  low.forEach(ing => {
    const need = (ing.min_stock || 0) - (ing.current_stock || 0);
    const units = ing.purchase_size ? Math.ceil(need / ing.purchase_size) : 1;
    const sup = ing.supplier || 'No supplier';
    if (!bySupplier.has(sup)) bySupplier.set(sup, []);
    bySupplier.get(sup).push({ ing, need, units });
  });
  for (const [sup, items] of bySupplier.entries()) {
    const card = el('div',{class:'card'});
    const total = items.reduce((s,it)=> s + (it.ing.purchase_price || 0)*it.units, 0);
    card.appendChild(el('div',{class:'card-hd'}, el('h2',{}, sup), el('span',{class:'chip a'}, dkk(total))));
    items.forEach(it => {
      card.appendChild(el('div',{class:'row'},
        el('div',{class:'grow'},
          el('div',{class:'ttl'}, it.ing.name),
          el('div',{class:'sb'}, `${num(it.ing.current_stock||0)}/${num(it.ing.min_stock||0)} ${it.ing.purchase_unit||''}`),
        ),
        el('div',{class:'right'},
          el('div',{style:{fontWeight:600}}, `${it.units} × ${num(it.ing.purchase_size,0)} ${it.ing.purchase_unit||''}`),
          el('div',{class:'sb',style:{fontSize:'12px'}}, dkk((it.ing.purchase_price||0)*it.units)),
        ),
      ));
    });
    card.appendChild(el('div',{class:'card-bd no-print',style:{display:'flex',gap:'8px'}},
      el('button',{class:'btn ghost sm', onclick:()=>exportSupplierCSV(sup,items)},'⇩ CSV'),
      el('button',{class:'btn ghost sm', onclick:()=>exportSupplierMail(sup,items)},'✉ Email'),
    ));
    body.appendChild(card);
  }
}

function exportSupplierCSV(sup, items) {
  const rows = [['Ingredient','Quantity','Unit size','Unit','Unit price','Total']];
  items.forEach(it => rows.push([
    it.ing.name, it.units, it.ing.purchase_size || '', it.ing.purchase_unit || '',
    it.ing.purchase_price || '', (it.ing.purchase_price||0)*it.units,
  ]));
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type:'text/csv' });
  const a = el('a',{href:URL.createObjectURL(blob), download:`order-${sup.replace(/\s+/g,'_')}.csv`});
  document.body.appendChild(a); a.click(); a.remove();
}

function exportSupplierMail(sup, items) {
  const body = items.map(it => `- ${it.ing.name}: ${it.units} × ${it.ing.purchase_size||''} ${it.ing.purchase_unit||''}`).join('\n');
  location.href = `mailto:?subject=Order ${sup}&body=${encodeURIComponent('Hi,\n\nWe would like to order:\n\n' + body + '\n\nBest regards')}`;
}

const COMMON_CURRENCIES = [
  ['DKK','Danish krone'], ['EUR','Euro'], ['CHF','Swiss franc'],
  ['GBP','British pound'], ['USD','US dollar'], ['SEK','Swedish krona'],
  ['NOK','Norwegian krone'], ['JPY','Japanese yen'],
];
const COMMON_LOCALES = [
  ['en-GB','English (UK) — 1,234.56'],
  ['en-US','English (US) — 1,234.56'],
  ['da-DK','Danish — 1.234,56'],
  ['de-CH','German (Switzerland) — 1’234.56'],
  ['de-DE','German (Germany) — 1.234,56'],
  ['fr-FR','French — 1 234,56'],
  ['es-ES','Spanish — 1.234,56'],
  ['it-IT','Italian — 1.234,56'],
  ['nl-NL','Dutch — 1.234,56'],
];

async function openTenantSettings() {
  const t = currentTenant();
  if (!t) return;
  const form = el('div');

  // Name (read-only — vi vil ikke have admins ændre tenant-name uden videre)
  form.appendChild(el('div',{class:'field'},
    el('label',{}, 'Tenant'),
    el('div',{style:{padding:'10px 12px',background:'rgba(26,26,26,.04)',borderRadius:'8px',fontWeight:600}},
      `${t.name} · ${t.city || ''}`),
  ));

  // Currency
  const curSel = el('select',{class:'input'});
  COMMON_CURRENCIES.forEach(([code,label]) => {
    const o = el('option',{value:code}, `${code} — ${label}`);
    if (code === (t.currency || 'DKK')) o.selected = true;
    curSel.appendChild(o);
  });
  form.appendChild(el('div',{class:'field'}, el('label',{},'Currency'), curSel));

  // Locale
  const locSel = el('select',{class:'input'});
  COMMON_LOCALES.forEach(([code,label]) => {
    const o = el('option',{value:code}, label);
    if (code === (t.locale || 'da-DK')) o.selected = true;
    locSel.appendChild(o);
  });
  form.appendChild(el('div',{class:'field'},
    el('label',{},'Number / date format'),
    locSel,
    el('div',{style:{fontSize:'12px',color:'var(--ink-mute)',marginTop:'6px'}},
      'Affects how numbers, dates and currency symbols are displayed.'),
  ));

  // Preview
  const preview = el('div',{style:{padding:'12px',background:'rgba(138,21,56,.04)',border:'1px solid var(--line)',borderRadius:'8px',fontSize:'13px',marginTop:'12px'}});
  const updatePreview = () => {
    const cur = curSel.value, loc = locSel.value;
    try {
      const fmt = new Intl.NumberFormat(loc, {style:'currency', currency:cur, maximumFractionDigits:2});
      preview.textContent = `Preview: ${fmt.format(1234.5)} · ${(1234.567).toLocaleString(loc,{maximumFractionDigits:2})}`;
    } catch(e) {
      preview.textContent = 'Invalid combination: ' + e.message;
    }
  };
  curSel.addEventListener('change', updatePreview);
  locSel.addEventListener('change', updatePreview);
  updatePreview();
  form.appendChild(preview);

  await modal('Tenant settings', form, async () => {
    const payload = { currency: curSel.value, locale: locSel.value };
    const { error } = await state.sb.from('tenants').update(payload).eq('id', t.id);
    if (error) return toast(error.message, 'bad');
    t.currency = payload.currency;
    t.locale = payload.locale;
    toast('Settings saved','ok');
    renderApp();
    return true;
  });
}

let _currentModal = null;
async function modal(title, body, onConfirm, onClose) {
  return new Promise(resolve => {
    closeModal();
    const bg = el('div',{class:'modal-bg', onclick:e=>{ if (e.target === bg) close(); }});
    const m = el('div',{class:'modal'});
    const close = (val) => {
      if (onClose) onClose();
      bg.remove();
      _currentModal = null;
      resolve(val);
    };
    m.appendChild(el('div',{class:'modal-hd'},
      el('h3',{},title),
      el('button',{class:'icon-btn',style:{color:'var(--ink)'},onclick:()=>close()},'✕'),
    ));
    const bd = el('div',{class:'modal-bd'}); bd.appendChild(body); m.appendChild(bd);
    if (onConfirm) {
      m.appendChild(el('div',{class:'modal-ft'},
        el('button',{class:'btn ghost',onclick:()=>close()},'Cancel'),
        el('button',{class:'btn',onclick:async()=>{ const ok = await onConfirm(); if (ok) close(true); }},'Save'),
      ));
    }
    bg.appendChild(m);
    document.body.appendChild(bg);
    _currentModal = bg;
  });
}
function closeModal() {
  if (_currentModal) { _currentModal.remove(); _currentModal = null; }
}

function renderSetup() {
  document.body.innerHTML = '';
  document.body.appendChild(el('div',{class:'center-screen'},
    el('div',{class:'center-card'},
      el('h1',{html:'Back<span class="dot">·</span>bar'}),
      el('div',{class:'tag'}, 'Setup required'),
      el('p',{style:{fontSize:'14px',marginBottom:'12px'}},
        'Configure Supabase keys in the HTML file at the top, under ',
        el('code',{}, 'SUPABASE_CONFIG'),
        ' before you can log in.'),
      el('div',{class:'help'},
        '1. Create a project at ', el('a',{href:'https://supabase.com',target:'_blank'},'supabase.com'), el('br'),
        '2. Run ', el('code',{},'schema.sql'), ' and ', el('code',{},'seed.sql'), ' in the SQL Editor', el('br'),
        '3. Create user via Authentication > Users', el('br'),
        '4. Add ', el('code',{},'memberships'), ' row with admin role', el('br'),

      ),
    )
  ));
}

function renderLogin() {
  document.body.innerHTML = '';
  document.body.appendChild(el('div',{id:'toasts',class:'toasts'}));
  const errBox = el('div',{class:'err',style:{display:'none'}});
  const email = el('input',{class:'input',type:'email',placeholder:'your@email.com'});
  const pw = el('input',{class:'input',type:'password',placeholder:'••••••••'});

  const onLogin = async () => {
    errBox.style.display = 'none';
    const { error } = await state.sb.auth.signInWithPassword({ email: email.value, password: pw.value });
    if (error) { errBox.textContent = error.message; errBox.style.display = 'block'; return; }
    await afterLogin();
  };

  document.body.appendChild(el('div',{class:'center-screen'},
    el('div',{class:'center-card'},
      el('h1',{html:'Back<span class="dot">·</span>bar'}),
      el('div',{class:'tag'}, 'Tools for the bar'),
      errBox,
      el('div',{class:'field'}, el('label',{},'Email'), email),
      el('div',{class:'field'}, el('label',{},'Password'), pw),
      el('button',{class:'btn',style:{width:'100%',marginTop:'6px'},onclick:onLogin},'Log in'),
      el('div',{class:'help'},'Users are created manually by admin in Supabase. Contact your bar manager.'),
    )
  ));
  pw.addEventListener('keydown', e => { if (e.key === 'Enter') onLogin(); });
}

function renderNoTenant() {
  document.body.innerHTML = '';
  document.body.appendChild(el('div',{class:'center-screen'},
    el('div',{class:'center-card'},
      el('h1',{html:'Back<span class="dot">·</span>bar'}),
      el('div',{class:'tag'}, 'No access'),
      el('p',{}, 'Your account is not linked to any bar. Contact your admin.'),
      el('button',{class:'btn ghost',style:{marginTop:'12px'},onclick:async()=>{await state.sb.auth.signOut();}}, 'Log out'),
    )
  ));
}
